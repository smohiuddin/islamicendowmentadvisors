<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title == "Home" %}{{ site.title }} — {{ site.org.tagline }}{% else %}{{ page.title }} · {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment:   #f5f0e8;
      --parchment-2: #ede6d6;
      --parchment-3: #e4dac6;
      --ink:         #1c1710;
      --ink-mid:     #4a4130;
      --ink-soft:    #7a6f5a;
      --gold:        #b8892a;
      --gold-light:  #d4a84b;
      --gold-pale:   #f0e4c4;
      --white:       #fdfaf4;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
      --max-w: 1120px;
      --gutter: 2rem;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--parchment);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem var(--gutter);
      background: rgba(245, 240, 232, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--parchment-3);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }

    /* Shared */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter); }

    .section-label {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 2rem;
    }
    .section-title em { font-style: italic; color: var(--gold); font-weight: 400; }

    .cta-btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: var(--gold);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--gold);
      transition: background 0.25s, color 0.25s;
    }
    .cta-btn:hover { background: transparent; color: var(--gold); }

    /* Hero */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 8rem var(--gutter) 6rem;
      overflow: hidden;
      background: var(--white);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 85% 50%, rgba(184,137,42,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 10% 80%, rgba(184,137,42,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 680px;
      animation: fadeUp 0.9s ease both;
    }
    .hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--gold);
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 300;
      line-height: 1.08;
      color: var(--ink);
      margin-bottom: 1.75rem;
      letter-spacing: -0.01em;
    }
    .hero-title em { font-style: italic; color: var(--gold); font-weight: 400; }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--ink-mid);
      max-width: 520px;
      margin-bottom: 2.5rem;
      line-height: 1.75;
    }
    .hero-ornament {
      position: absolute;
      right: 5vw;
      top: 50%;
      transform: translateY(-50%);
      width: clamp(300px, 38vw, 520px);
      color: var(--gold);
      animation: rotateSlow 80s linear infinite;
      pointer-events: none;
    }
    @keyframes rotateSlow {
      from { transform: translateY(-50%) rotate(0deg); }
      to   { transform: translateY(-50%) rotate(360deg); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider */
    .divider-line {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--parchment-3) 30%, var(--gold-pale) 50%, var(--parchment-3) 70%, transparent);
    }

    /* Offerings */
    .services { padding: 7rem var(--gutter); background: var(--parchment); }

    .offerings {
      margin-top: 3.5rem;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--parchment-3);
      background: var(--white);
    }
    .offering {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      padding: 2.75rem 3rem;
      align-items: start;
      transition: background 0.2s;
    }
    .offering:hover { background: var(--gold-pale); }
    .offering-divider {
      height: 1px;
      background: var(--parchment-3);
      margin: 0 3rem;
    }
    .offering-header {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }
    .offering-num {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      flex-shrink: 0;
      margin-top: -0.2rem;
    }
    .offering-header h3 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }
    .offering-desc {
      font-size: 0.88rem;
      color: var(--ink-soft);
      line-height: 1.65;
    }
    .offering-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding-top: 0.25rem;
    }
    .offering-items li {
      font-size: 0.88rem;
      color: var(--ink-mid);
      padding-left: 1.25rem;
      position: relative;
    }
    .offering-items li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-size: 0.75rem;
    }

    /* About */
    .about { padding: 7rem var(--gutter); background: var(--ink); }
    .about-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: start;
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .about .section-label { color: var(--gold-light); }
    .about .section-title { color: var(--parchment); }
    .about-text p {
      font-size: 0.95rem;
      color: rgba(245,240,232,0.72);
      margin-bottom: 1.25rem;
      line-height: 1.8;
    }
    .about-quote-block {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      align-self: center;
    }
    .about-quote-block blockquote {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(245,240,232,0.65);
      line-height: 1.5;
      text-align: center;
    }

    /* Founders */
    .advisors { padding: 7rem var(--gutter); background: var(--parchment-2); }

    .founder-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }
    .founder-card {
      background: var(--white);
      border: 1px solid var(--parchment-3);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .founder-header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .founder-header > div { display: flex; flex-direction: column; gap: 0.2rem; }
    .advisor-initials {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--gold-pale);
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 500;
      color: var(--gold);
      flex-shrink: 0;
    }
    .founder-header strong {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ink);
    }
    .founder-header span {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .founder-card p { font-size: 0.88rem; color: var(--ink-soft); line-height: 1.75; }

    /* Contact */
    .contact { padding: 7rem var(--gutter); background: var(--parchment); position: relative; overflow: hidden; }
    .contact-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4rem;
      align-items: center;
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .contact-text p {
      font-size: 0.95rem;
      color: var(--ink-mid);
      margin-bottom: 2rem;
      max-width: 460px;
      line-height: 1.75;
    }
    .contact-ornament {
      width: 180px;
      color: var(--gold);
      opacity: 0.6;
      animation: rotateSlow 120s linear infinite reverse;
    }

    /* Footer */
    footer {
      background: var(--ink);
      color: rgba(245,240,232,0.4);
      padding: 2.5rem var(--gutter);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
    }
    footer a { color: rgba(245,240,232,0.4); text-decoration: none; }
    footer a:hover { color: var(--gold-light); }
    .footer-logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 400;
      color: rgba(245,240,232,0.7);
    }

    /* Responsive */
    @media (max-width: 768px) {
      :root { --gutter: 1.25rem; }
      .nav-links { display: none; }
      .hero-ornament { display: none; }
      .offering { grid-template-columns: 1fr; gap: 1.5rem; padding: 2rem 1.5rem; }
      .offering-divider { margin: 0 1.5rem; }
      .about-inner { grid-template-columns: 1fr; gap: 3rem; }
      .contact-inner { grid-template-columns: 1fr; }
      .contact-ornament { display: none; }
      footer { flex-direction: column; gap: 0.75rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Islamic Endowment<span> Advisors</span></a>
    <ul class="nav-links">
      <li><a href="#services">What We Offer</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#team">Founders</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-logo">Islamic Endowment Advisors</div>
    <div>A volunteer-driven non-profit · All services provided pro bono</div>
    <div>
      <a href="mailto:{{ site.org.email }}">{{ site.org.email }}</a>
    </div>
  </footer>

</body>
</html>
